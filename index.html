<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>เกมภาษาไทย AR - สุดยอดนักล่าคำตอบ</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Prompt', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            background-color: #000;
        }

        /* กล่องคำถามด้านบนสุด สไตล์ Cyberpunk/Sci-Fi หรูหรา */
        #quiz-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 650px;
            background: linear-gradient(135deg, rgba(19, 28, 54, 0.9), rgba(27, 40, 77, 0.95));
            border: 2px solid #00d2ff;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.5), inset 0 0 10px rgba(0, 210, 255, 0.2);
            border-radius: 16px;
            padding: 15px;
            box-sizing: border-box;
            z-index: 10;
            text-align: center;
            transition: all 0.3s;
        }

        #question-text {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }

        #question-image {
            max-height: 110px;
            display: none;
            margin: 5px auto;
            border-radius: 8px;
            border: 2px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* สถิติ คะแนน และ เวลา */
        #stats-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        .stat-box {
            background: rgba(10, 15, 30, 0.85);
            color: #fff;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            border: 1px solid #ff007f;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.4);
            min-width: 100px;
            text-align: center;
        }

        .stat-box span {
            color: #ff007f;
            font-size: 22px;
        }
        #score-span { color: #00ffcc !important; }

        /* ระบบแจ้งเตือนเมื่อตอบถูก/ผิด */
        #feedback-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            font-size: 40px;
            font-weight: 900;
            z-index: 100;
            opacity: 0;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        .toast-correct { color: #00ffcc; opacity: 1 !important; transform: translate(-50%, -50%) scale(1.2) !important; }
        .toast-wrong { color: #ff0055; opacity: 1 !important; transform: translate(-50%, -50%) scale(1.2) !important; }

        /* หน้าจอเริ่มเกม / จบเกม */
        .overlay-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1c3a 0%, #0d0e1b 100%);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .btn {
            background: linear-gradient(45deg, #00d2ff, #00ffcc);
            color: #0d0e1b;
            padding: 15px 45px;
            font-size: 22px;
            font-weight: 700;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.6);
            transition: 0.2s ease;
        }
        .btn:hover { transform: scale(1.05); filter: brightness(1.1); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="feedback-toast"></div>

    <div id="start-screen" class="overlay-screen">
        <h1 style="font-size: 38px; color: #00d2ff; margin-bottom: 5px; text-shadow: 0 0 15px rgba(0,210,255,0.5);">ไทยล่าแต้ม AR</h1>
        <p style="font-size: 16px; color: #a0a5c0; max-width: 450px; margin-bottom: 10px;">
            ใช้นิ้วสัมผัสหน้าจอเพื่อ<strong>ลากและชี้เป้าพอยเตอร์สีเหลือง</strong>วิ่งไปชนคำตอบที่ถูกต้องอย่างรวดเร็ว!
        </p>
        <button class="btn" onclick="startGame()">ลุยเลย!</button>
    </div>

    <div id="end-screen" class="overlay-screen hidden">
        <h1 style="font-size: 45px; color: #ff007f; text-shadow: 0 0 20px rgba(255,0,127,0.5);">จบการแข่งขัน!</h1>
        <p id="final-score" style="font-size: 26px; margin: 20px 0; font-weight:600;"></p>
        <button class="btn" onclick="restartGame()">ท้าทายอีกรอบ</button>
    </div>

    <div id="quiz-container" class="hidden">
        <div id="question-text">กำลังโหลดข้อสอบ...</div>
        <img id="question-image" src="" alt="โจทย์รูปภาพ">
    </div>

    <div id="stats-container" class="hidden">
        <div class="stat-box">คะแนน: <span id="score-span">0</span></div>
        <div class="stat-box">เวลา: <span id="timer-span">60</span></div>
    </div>

    <a-scene vr-mode-ui="enabled: false" arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;" renderer="antialias: true; alpha: true">
        
        <a-assets>
            <img id="img-cat" src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=400&auto=format&fit=crop">
            <img id="img-sun" src="https://images.unsplash.com/photo-1506703719100-a0f3a48c0f86?w=400&auto=format&fit=crop">
        </a-assets>

        <a-entity camera position="0 1.6 0">
            <a-entity id="touch-pointer" 
                      geometry="primitive: sphere; radius: 0.08" 
                      material="color: #ffeb3b; shader: flat; emissive: #ffeb3b"
                      position="0 0 -2.5"
                      raycaster="objects: .clickable; showLine: false; far: 10"
                      line="color: #ffeb3b; opacity: 0.5">
                <a-light type="point" intensity="0.5" distance="2"></a-light>
            </a-entity>
        </a-entity>

        <a-entity id="answers-group" position="0 1.6 -3.5"></a-entity>

    </a-scene>

    <script>
        // ข้อมูลคำถามวิชาภาษาไทย (แก้ไขเพิ่มเติมตรงนี้ได้เลย)
        const quizData = [
            {
                text: "คำว่า 'สุนัข' จัดเป็นคำชนิดใดในภาษาไทย?",
                image: "",
                answers: ["คำนาม", "คำสรรพนาม", "คำกริยา", "คำวิเศษณ์"],
                correct: 0
            },
            {
                text: "สัตว์ในรูปภาพนี้ จัดเป็นคำประเภทใด?",
                image: "#img-cat",
                answers: ["คำเป็น", "คำตาย", "คำครุ", "คำลhุ"],
                correct: 0
            },
            {
                text: "ภาพดวงอาทิตย์ขึ้นนี้ สะกดด้วยมาตราแม่ใด?",
                image: "#img-sun",
                answers: ["แม่กน", "แม่กง", "แม่เกย", "แม่กม"],
                correct: 2
            },
            {
                text: "ข้อใดใช้ลักษณนามคำว่า 'เล่ม' ได้ถูกต้องทั้งหมด?",
                image: "",
                answers: ["ดินสอ, ปากกา", "หนังสือ, เกวียน", "สมุด, ไม้บรรทัด", "บ้าน, ร่ม"],
                correct: 1
            },
            {
                text: "สำนวนใดมีความหมายตรงกับคำว่า 'ทำดีได้ดี ทำชั่วได้ชั่ว'?",
                image: "",
                answers: ["ตบมือข้างเดียวไม่ดัง", "กงเกวียนกำเกวียน", "น้ำลดตอผุด", "ตักน้ำรดหัวตอ"],
                correct: 1
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let timeLeft = 60;
        let gameInterval;
        const prefix = ["ก.", "ข.", "ค.", "ง."];

        // ระบบจับความเคลื่อนไหวหน้าจอเพื่อลากพอยเตอร์ (Touch / Drag Pointer)
        const pointerEl = document.getElementById('touch-pointer');
        let isDragging = false;

        function updatePointerPosition(clientX, clientY) {
            // แปลงพิกัดจากหน้าจอ 2D (X, Y) ไปเป็นพิกัดลอยในช่องมองภาพ AR 3D 
            const normalizedX = (clientX / window.innerWidth) * 2 - 1;
            const normalizedY = -(clientY / window.innerHeight) * 2 + 1;
            
            // จำกัดการเคลื่อนที่ให้อยู่ในขอบเขตหน้าจอพอดี รวดเร็ว เสถียร
            pointerEl.setAttribute('position', `${normalizedX * 1.8} ${(normalizedY * 1.2)} -2.5`);
        }

        window.addEventListener('mousedown', (e) => { isDragging = true; updatePointerPosition(e.clientX, e.clientY); });
        window.addEventListener('mousemove', (e) => { if (isDragging) updatePointerPosition(e.clientX, e.clientY); });
        window.addEventListener('mouseup', () => isDragging = false);

        window.addEventListener('touchstart', (e) => { isDragging = true; updatePointerPosition(e.touches[0].clientX, e.touches[0].clientY); });
        window.addEventListener('touchmove', (e) => { if (isDragging) updatePointerPosition(e.touches[0].clientX, e.touches[0].clientY); });
        window.addEventListener('touchend', () => isDragging = false);

        // ฟังชันก์เริ่มระบบเกม
        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-container').classList.remove('hidden');
            document.getElementById('stats-container').classList.remove('hidden');
            
            score = 0;
            timeLeft = 60;
            currentQuestionIndex = 0;
            document.getElementById('score-span').innerText = score;
            document.getElementById('timer-span').innerText = timeLeft;

            loadQuestion();
            
            gameInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-span').innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        // จัดหน้าคำตอบเรียงสวย ฝั่งละ 2 ข้อ (ก, ค อยู่ซ้าย | ข, ง อยู่ขวา)
        function loadQuestion() {
            if (currentQuestionIndex >= quizData.length) currentQuestionIndex = 0; // วนคำถามเมื่อหมดคลัง

            const currentQuestion = quizData[currentQuestionIndex];
            document.getElementById('question-text').innerText = currentQuestion.text;
            
            const imgEl = document.getElementById('question-image');
            if (currentQuestion.image) {
                imgEl.src = document.querySelector(currentQuestion.image).src;
                imgEl.style.display = "block";
            } else {
                imgEl.style.display = "none";
            }

            const group = document.getElementById('answers-group');
            group.innerHTML = ''; // ล้างคำตอบเก่า

            // พิกัดจัดเรียงแผงคำตอบ 2 ฝั่ง (ซ้าย-ขวา) เป็นระเบียบสวยงามเหมือนตู้เกมตึก
            // ฝั่งซ้าย (ก=ข้อ0, ค=ข้อ2) | ฝั่งขวา (ข=ข้อ1, ง=ข้อ3)
            const layoutGrid = [
                {x: -1.3, y: 0.5, z: 0},  // ก. บนซ้าย
                {x: 1.3, y: 0.5, z: 0},   // ข. บนขวา
                {x: -1.3, y: -0.4, z: 0}, // ค. ล่างซ้าย
                {x: 1.3, y: -0.4, z: 0}   // ง. ล่างขวา
            ];

            currentQuestion.answers.forEach((answerText, index) => {
                const pos = layoutGrid[index];

                // บล็อกคำตอบหลัก
                const choiceEntity = document.createElement('a-entity');
                choiceEntity.setAttribute('class', 'clickable');
                choiceEntity.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);

                // แผ่นป้ายหลังดีไซน์หรู
                const boxBg = document.createElement('a-plane');
                boxBg.setAttribute('width', '2.3');
                boxBg.setAttribute('height', '0.7');
                boxBg.setAttribute('material', 'color: #1a237e; opacity: 0.9; shader: flat; side: double-sid');
                
                // กรอบป้ายเรืองแสง (Cyber design)
                const border = document.createElement('a-ring');
                border.setAttribute('radius-inner', '0.01');
                border.setAttribute('radius-outer', '0.02');
                border.setAttribute('scale', '115 35 1');
                border.setAttribute('material', 'color: #00d2ff; shader: flat');

                // ข้อความภายในป้าย (ก ข ค ง + ตัวคำตอบ)
                const textLabel = document.createElement('a-text');
                textLabel.setAttribute('value', `${prefix[index]} ${answerText}`);
                textLabel.setAttribute('align', 'center');
                textLabel.setAttribute('width', '4.5');
                textLabel.setAttribute('font', 'https://cdn.aframe.io/fonts/DejaVu-sdf.json'); 
                textLabel.setAttribute('position', '0 0 0.05');
                textLabel.setAttribute('color', '#ffffff');

                // เพิ่ม Event ตรวจจับเมื่อพอยเตอร์สีเหลืองวิ่งมาชน (mouseenter จากการลากชน)
                choiceEntity.addEventListener('mouseenter', () => {
                    checkAnswer(index);
                });

                // ประกอบวัตถุเข้าด้วยกัน
                choiceEntity.appendChild(boxBg);
                choiceEntity.appendChild(border);
                choiceEntity.appendChild(textLabel);
                group.appendChild(choiceEntity);
            });
        }

        // เช็คผลคะแนนและทำเอฟเฟกต์ Toast แจ้งเตือน
        function checkAnswer(selectedIndex) {
            const currentQuestion = quizData[currentQuestionIndex];
            const toast = document.getElementById('feedback-toast');

            if (selectedIndex === currentQuestion.correct) {
                score += 1;
                toast.innerText = "+1 แต้ม";
                toast.className = "toast-correct";
            } else {
                score -= 1;
                if (score < 0) score = 0; // ไม่ติดลบ
                toast.innerText = "-1 แต้ม";
                toast.className = "toast-wrong";
            }
            
            document.getElementById('score-span').innerText = score;

            // เคลียร์แอนิเมชันคำชี้แนะ
            setTimeout(() => { toast.className = ""; }, 600);

            // โหลดข้อถัดไปทันทีอย่างรวดเร็ว
            currentQuestionIndex++;
            loadQuestion();
        }

        function endGame() {
            clearInterval(gameInterval);
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('stats-container').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = `สรุปคะแนนของคุณ: ${score} คะแนน`;
        }

        function restartGame() {
            document.getElementById('end-screen').classList.add('hidden');
            startGame();
        }
    </script>
</body>
</html>
