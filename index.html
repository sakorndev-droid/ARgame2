<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>เกมภาษาไทย AR - สุดยอดนักล่าคำตอบ</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Prompt', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            background-color: #000;
        }

        /* 1. กล่องคำถามด้านบนสุด ทันสมัย */
        #quiz-container {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(30, 41, 59, 0.95));
            border: 2px solid #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
            border-radius: 16px;
            padding: 15px;
            box-sizing: border-box;
            z-index: 100;
            text-align: center;
        }

        #question-text {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        #question-image {
            max-height: 100px;
            display: none;
            margin: 10px auto 0 auto;
            border-radius: 8px;
            border: 2px solid #fff;
        }

        /* 2. แผงปุ่มคำตอบย้ายออกไปอยู่ด้านข้าง (ซ้าย-ขวา) ไม่บังตรงกลาง */
        .answers-side-container {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 140px;
            z-index: 90;
            pointer-events: none; /* ให้สิทธิ์การทัชผ่านไปยังระบบลากพอยเตอร์ */
        }

        #left-answers { left: 15px; }
        #right-answers { right: 15px; }

        .choice-card {
            background: linear-gradient(135deg, rgba(26, 21, 62, 0.9), rgba(34, 25, 99, 0.95));
            border: 2px solid #9d4edd;
            box-shadow: 0 0 10px rgba(157, 78, 221, 0.3);
            border-radius: 12px;
            padding: 15px 10px;
            color: #fff;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s;
            word-wrap: break-word;
        }

        /* เอฟเฟกต์เรืองแสงเมื่อพอยเตอร์วิ่งมาชน */
        .choice-card.highlight-target {
            border-color: #00ffcc;
            box-shadow: 0 0 25px #00ffcc;
            background: rgba(0, 255, 204, 0.2);
            color: #00ffcc;
            transform: scale(1.05);
        }

        .choice-prefix {
            display: block;
            font-size: 20px;
            font-weight: 700;
            color: #ff007f;
            margin-bottom: 3px;
        }
        .choice-card.highlight-target .choice-prefix { color: #00ffcc; }

        /* 3. สถิติ คะแนน และ เวลา ด้านล่าง */
        #stats-container {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .stat-box {
            background: rgba(15, 23, 42, 0.85);
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 700;
            border: 1px solid #ff007f;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
            min-width: 90px;
            text-align: center;
        }
        #score-span { color: #00ffcc; font-size: 20px; }
        #timer-span { color: #ff007f; font-size: 20px; }

        /* ระบบแจ้งเตือน Toast +1 / -1 กลางจอ */
        #feedback-toast {
            position: fixed;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            font-size: 45px;
            font-weight: 900;
            z-index: 200;
            opacity: 0;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        .toast-correct { color: #00ffcc; opacity: 1 !important; transform: translate(-50%, -50%) scale(1.2) !important; }
        .toast-wrong { color: #ff0055; opacity: 1 !important; transform: translate(-50%, -50%) scale(1.2) !important; }

        /* หน้าจอเริ่มเกม / จบเกม */
        .overlay-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #111827 0%, #030712 100%);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .btn {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: #fff;
            padding: 12px 40px;
            font-size: 20px;
            font-weight: 700;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.5);
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="feedback-toast"></div>

    <div id="start-screen" class="overlay-screen">
        <h1 style="font-size: 34px; color: #00f2fe; margin-bottom: 10px; text-shadow: 0 0 10px rgba(0,242,254,0.4);">เกมภาษาไทย AR ทัชสปีด</h1>
        <p style="font-size: 16px; color: #9ca3af; max-width: 400px;">ใช้นิ้วแตะหรือลากพอยเตอร์สีเหลืองไปชนคำตอบด้านข้างให้ถูกต้องและเร็วที่สุด!</p>
        <button class="btn" onclick="startGame()">เริ่มเล่น</button>
    </div>

    <div id="end-screen" class="overlay-screen hidden">
        <h1 style="font-size: 40px; color: #ff007f;">จบเกมแล้ว!</h1>
        <p id="final-score" style="font-size: 24px; margin: 20px 0;"></p>
        <button class="btn" onclick="restartGame()">เล่นอีกครั้ง</button>
    </div>

    <div id="quiz-container" class="hidden">
        <div id="question-text">กำลังโหลดคำถาม...</div>
        <img id="question-image" src="" alt="โจทย์รูปภาพ">
    </div>

    <div id="left-answers" class="answers-side-container hidden">
        <div id="choice-0" class="choice-card"><span class="choice-prefix">ก</span><span class="text"></span></div>
        <div id="choice-2" class="choice-card"><span class="choice-prefix">ค</span><span class="text"></span></div>
    </div>

    <div id="right-answers" class="answers-side-container hidden">
        <div id="choice-1" class="choice-card"><span class="choice-prefix">ข</span><span class="text"></span></div>
        <div id="choice-3" class="choice-card"><span class="choice-prefix">ง</span><span class="text"></span></div>
    </div>

    <div id="stats-container" class="hidden">
        <div class="stat-box">คะแนน: <span id="score-span">0</span></div>
        <div class="stat-box">เวลา: <span id="timer-span">60</span></div>
    </div>

    <a-scene vr-mode-ui="enabled: false" arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">
        <a-assets>
            <img id="img-cat" src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=400&auto=format&fit=crop">
            <img id="img-sun" src="https://images.unsplash.com/photo-1506703719100-a0f3a48c0f86?w=400&auto=format&fit=crop">
        </a-assets>

        <a-entity camera position="0 1.6 0">
            <a-entity id="touch-pointer" 
                      geometry="primitive: sphere; radius: 0.06" 
                      material="color: #ffeb3b; shader: flat"
                      position="0 0 -2">
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        const quizData = [
            {
                text: "คำว่า 'สุนัข' จัดเป็นคำชนิดใดในภาษาไทย?",
                image: "",
                answers: ["คำนาม", "คำสรรพนาม", "คำกริยา", "คำวิเศษณ์"],
                correct: 0
            },
            {
                text: "สัตว์ในรูปภาพนี้ จัดเป็นคำประเภทใด?",
                image: "#img-cat",
                answers: ["คำเป็น", "คำตาย", "คำครุ", "คำลหุ"],
                correct: 0
            },
            {
                text: "ภาพดวงอาทิตย์ขึ้นนี้ สะกดด้วยมาตราแม่ใด?",
                image: "#img-sun",
                answers: ["แม่กน", "แม่กง", "แม่เกย", "แม่กม"],
                correct: 2
            },
            {
                text: "ข้อใดคือลักษณนามของ 'ปากกา'?",
                image: "",
                answers: ["ด้าม", "แท่ง", "เล่ม", "อัน"],
                correct: 0
            },
            {
                text: "สำนวน 'ไก่เห็นตีนงู...' ประโยคต่อไปคืออะไร?",
                image: "",
                answers: ["งูเห็นนมไก่", "งูเห็นหางไก่", "งูไล่กัดไก่", "งูไม่กินไก่"],
                correct: 0
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let timeLeft = 60;
        let gameInterval;
        let canAnswer = true;

        const pointerEl = document.getElementById('touch-pointer');

        // ฟังก์ชันคำนวณตำแหน่งและตรวจจับการชนป้ายด้านข้าง (Collision Detection)
        function handlePointerMove(clientX, clientY) {
            // 1. เลื่อนพอยเตอร์ 3D ให้วิ่งตามตำแหน่งนิ้วอย่างรวดเร็ว
            const normalizedX = (clientX / window.innerWidth) * 2 - 1;
            const normalizedY = -(clientY / window.innerHeight) * 2 + 1;
            pointerEl.setAttribute('position', `${normalizedX * 1.5} ${normalizedY * 1.1} -2`);

            if (!canAnswer) return;

            // 2. ตรวจสอบว่าพอยเตอร์วิ่งไปแตะโดนพื้นที่ของป้ายคำตอบใดบนหน้าจอ 2D หรือไม่
            for (let i = 0; i < 4; i++) {
                const card = document.getElementById(`choice-${i}`);
                const rect = card.getBoundingClientRect();

                // เช็คว่าตำแหน่งนิ้ว/พอยเตอร์ อยู่ในขอบเขตป้ายคำตอบนั้นไหม
                if (clientX >= rect.left && clientX <= rect.right &&
                    clientY >= rect.top && clientY <= rect.bottom) {
                    
                    card.classList.add('highlight-target');
                    canAnswer = false; // ล็อกไม่ให้แตะซ้ำซ้อนในเสี้ยววินาทีเดียวกัน
                    
                    setTimeout(() => {
                        checkAnswer(i);
                        card.classList.remove('highlight-target');
                    }, 200); // ดีเลย์เล็กน้อยให้เห็นเอฟเฟกต์กระพริบตา
                    break;
                }
            }
        }

        // เชื่อมโยง Event การลากนิ้ว/เมาส์ เข้ากับระบบ Pointer วิ่งตามมือ
        window.addEventListener('mousemove', (e) => handlePointerMove(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                handlePointerMove(e.touches[0].clientX, e.touches[0].clientY);
            }
        });
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                handlePointerMove(e.touches[0].clientX, e.touches[0].clientY);
            }
        });

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-container').classList.remove('hidden');
            document.getElementById('left-answers').classList.remove('hidden');
            document.getElementById('right-answers').classList.remove('hidden');
            document.getElementById('stats-container').classList.remove('hidden');
            
            score = 0;
            timeLeft = 60;
            currentQuestionIndex = 0;
            document.getElementById('score-span').innerText = score;
            document.getElementById('timer-span').innerText = timeLeft;

            loadQuestion();
            
            gameInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-span').innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function loadQuestion() {
            if (currentQuestionIndex >= quizData.length) currentQuestionIndex = 0;

            const currentQuestion = quizData[currentQuestionIndex];
            document.getElementById('question-text').innerText = currentQuestion.text;
            
            const imgEl = document.getElementById('question-image');
            if (currentQuestion.image) {
                imgEl.src = document.querySelector(currentQuestion.image).src;
                imgEl.style.display = "block";
            } else {
                imgEl.style.display = "none";
            }

            // ใส่ข้อความคำตอบลงในป้ายด้านข้างแต่ละปุ่ม
            for (let i = 0; i < 4; i++) {
                const card = document.getElementById(`choice-${i}`);
                card.querySelector('.text').innerText = currentQuestion.answers[i];
                card.classList.remove('highlight-target');
            }
            canAnswer = true;
        }

        function checkAnswer(selectedIndex) {
            const currentQuestion = quizData[currentQuestionIndex];
            const toast = document.getElementById('feedback-toast');

            if (selectedIndex === currentQuestion.correct) {
                score += 1;
                toast.innerText = "+1 แต้ม";
                toast.className = "toast-correct";
            } else {
                score -= 1;
                if (score < 0) score = 0;
                toast.innerText = "-1 แต้ม";
                toast.className = "toast-wrong";
            }
            
            document.getElementById('score-span').innerText = score;
            setTimeout(() => { toast.className = ""; }, 500);

            currentQuestionIndex++;
            setTimeout(loadQuestion, 300); // เว้นจังหวะให้โหลดข้อใหม่ลื่น ๆ
        }

        function endGame() {
            clearInterval(gameInterval);
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('left-answers').classList.add('hidden');
            document.getElementById('right-answers').classList.add('hidden');
            document.getElementById('stats-container').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = `คะแนนที่คุณทำได้: ${score} คะแนน`;
        }

        function restartGame() {
            document.getElementById('end-screen').classList.add('hidden');
            startGame();
        }
    </script>
</body>
</html>
